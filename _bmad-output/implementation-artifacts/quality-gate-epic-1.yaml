gate_reasoning:
  decision: CONCERNS
  rationale: |
    P0 coverage is 100% (5/5) — all critical infrastructure requirements are tested.
    Overall coverage at 88% exceeds the 80% threshold.

    However, P1 coverage is 83% (5/6 fully covered, 1 partial) which is below the 90%
    threshold. TC-E1-P1-05 is the failing case: the EF Core migration test exists only
    as an InMemory unit test; the actual PostgreSQL integration (verifying siesa_agents_db
    creation and __ef_migrations_history snake_case table) is NOT implemented.

    This qualifies as CONCERNS rather than FAIL because:
    - Evidence EXISTS (unit tests, migration files, AppDbContext implementation)
    - The gap is due to environment constraint (no PostgreSQL/TestContainers in CI)
    - The implementation is complete (migration file at 20260529053352_InitialCreate.cs)
    - This is a known and documented gap, not an unmitigated risk

concerns:
  - id: C1
    severity: P1
    test_case: TC-E1-P1-05
    description: >
      AC-1.3-1: PostgreSQL integration test not implemented. AppDbContext is verified
      via InMemory provider only. The actual creation of `siesa_agents_db` and
      snake_case `__ef_migrations_history` table cannot be validated without a
      real PostgreSQL instance or TestContainers setup.
    evidence_exists: true
    evidence_files:
      - "backend/tests/SiesaAgents.UnitTests/Infrastructure/AppDbContextTests.cs"
      - "backend/src/SiesaAgents.Infrastructure/Migrations/20260529053352_InitialCreate.cs"
    resolution: >
      Add xUnit integration test using TestContainers (Postgres) or a local test
      database to verify: (1) siesa_agents_db created, (2) __ef_migrations_history
      table uses snake_case columns, (3) no domain tables exist at this stage.

  - id: C2
    severity: P2
    test_case: TC-E1-P2-04
    description: >
      AC-1.3-3: snake_case column naming is tested at model-build level (unit) but
      actual DB column names (e.g., migration_id vs MigrationId) are not verified
      against a real PostgreSQL schema. Custom ModelBuilderExtensions are in place.
    evidence_exists: true
    evidence_files:
      - "backend/tests/SiesaAgents.UnitTests/Infrastructure/ModelBuilderExtensionsTests.cs"
      - "backend/src/SiesaAgents.Infrastructure/Extensions/ModelBuilderExtensions.cs"
    resolution: >
      Close with the same TestContainers integration test from C1 — inspect
      information_schema.columns after database update to assert snake_case naming.

  - id: C3
    severity: P2
    description: >
      siesa-ui-kit NavigationRail/NavigationBar components are unavailable in the
      npm registry. Custom Tailwind-based components substitute them. Tests cover
      the custom implementation only; compliance with the official kit API is
      unverified.
    evidence_exists: true
    resolution: >
      Once siesa-ui-kit becomes available, verify that component props (data-testid
      attributes, activeProps, aria-labels) match the kit's public API and rerun tests.

