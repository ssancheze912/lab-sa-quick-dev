gaps:
  critical:
    - id: GAP-1
      description: >
        Story 1.2 review returned FAIL on CRITICAL-1: siesa-ui-kit components (LayoutBase,
        NavigationRail, NavigationBar) are NOT used in __root.tsx despite being explicitly
        required by the story tasks and mandatory company standard ("check siesa-ui-kit first").
        Implementation uses custom <nav> HTML with hand-rolled styling and a custom useIsMobile hook.
        This means AC-1.2.a, AC-1.2.b, AC-E1.1 cannot be verified against the correct implementation.
      ac_impacted:
        - AC-1.2.a
        - AC-1.2.b
        - AC-E1.1
      severity: CRITICAL
      story: "1.2"
      must_resolve_before_gate_pass: true

    - id: GAP-2
      description: >
        4 Playwright E2E tests for SPA navigation (TC-E1-P1-01 / AC-1.2.c "no full reload")
        are marked .fixme because Playwright v1.56 fires framenavigated for all history.pushState
        events, making "full reload detection" tests impossible without hash routing or test
        modification. This is a known tooling limitation documented in the story completion notes.
      ac_impacted:
        - AC-1.2.c
        - AC-E1.2
      severity: HIGH
      story: "1.2"
      must_resolve_before_gate_pass: false
      resolution_path: >
        Modify test assertions to use alternative full-reload detection (e.g., script injection
        counter reset check) or accept that SPA navigation is validated via Component tests only.

  medium:
    - id: GAP-3
      description: >
        Database integration tests (TC-E1-P1-05, AC-1.3.a, AC-1.3.b, AC-1.3.d, 14 API spec tests)
        require a running PostgreSQL instance. Cannot be verified in the current environment.
        Story 1.3 is marked done — implementation artifacts are present and correct.
      severity: MEDIUM
      category: environment
      story: "1.3"

    - id: GAP-4
      description: >
        Backend API and E2E tests (TC-E1-P0-03, TC-E1-P0-04, TC-E1-P0-05 and associated ATDD specs)
        require running .NET backend on port 5000 and frontend on port 5173. Cannot be verified
        in current environment. Stories 1.1 and 1.3 are done.
      severity: MEDIUM
      category: environment
      stories:
        - "1.1"
        - "1.3"

high_risk_mitigations:
  R1_cors:
    status: COVERED
    evidence: "CORS policy DevCors configured in Program.cs; ATDD API spec (ATDD-1.1-API-06..07) and E2E spec (ATDD-1.1-E2E-05..06) designed; Story 1.1 done"
  R2_typescript_strict:
    status: COVERED
    evidence: "tsconfig.app.json with strict=true confirmed; E2E spec (ATDD-1.1-E2E-03, ATDD-1.1-E2E-07) and build test (TC-E1-P0-01) designed; Story 1.1 done"
  R3_exception_middleware:
    status: COVERED
    evidence: "ExceptionHandlingMiddlewareTests.cs (8 unit tests) present; API spec (7 AC3 tests) designed; Story 1.3 done; detail=null confirmed in implementation pattern"

decision:
  gate: CONCERNS
  rationale: >
    Design coverage meets all thresholds: P0=100% (threshold 100%), P1=100% (threshold 90%),
    overall=100% (threshold 80%). All three high-risk items (R1, R2, R3) are mitigated.
    Stories 1.1 and 1.3 are done with PASS reviews. HOWEVER, Story 1.2 has a review FAIL
    on CRITICAL-1 (siesa-ui-kit not used — mandatory company standard violated), placing the
    story back in-progress. This means AC-1.2.a, AC-1.2.b, and AC-E1.1 cannot be considered
    executed against a compliant implementation. Additionally, 4 Playwright SPA navigation
    tests are unfixable in the current tooling configuration (.fixme). These two items
    together constitute CONCERNS-level evidence: the design is complete and thresholds are
    met, but the implementation evidence is MISSING/INCOMPLETE for the navigation shell AC.
    The gate is CONCERNS (not FAIL) because the test designs exist, the issue is implementation
    compliance (not test gap), and a clear remediation path exists (fix Story 1.2 per CRITICAL-1).

  conditions_to_pass:
    - "Story 1.2 must be fixed to use siesa-ui-kit LayoutBase, NavigationRail, NavigationBar (resolve CRITICAL-1)"
    - "Vitest component tests for navigation shell must pass with the siesa-ui-kit implementation"
    - "SPA navigation test strategy must be resolved (modify E2E assertions or accept component-test-only coverage with justification)"
    - "Backend and database integration tests must be executed against running environment before epic closure"

  conditions_to_fail:
    - "If Story 1.2 is re-implemented without siesa-ui-kit after CRITICAL-1 is raised again"
    - "If any P0 test fails upon execution against running servers"

